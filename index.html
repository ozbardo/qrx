<main id=A></main>
<script id=S>
// shorthands
L = location
LP = L.pathname
$L = localStorage
T = 'target'
TL = 'toLowerCase'
HR=history.replaceState.bind(history) // TODO: this is now longer than just history.replaceState for # of HRs
// default indexedDB name
filename = MAIN = 'main'
DB = LP.slice(1) || MAIN
S = 'createObjectStore'
!L.hash && HR(0, '', `#${MAIN}`)
// default table name
FILES = 'files'
// history logging (pathname+hash+query only)
$H='history'
log=()=>getDB().then(d=>{let t=+new Date;return queryDB(tx('readwrite',d,$H).put({t,u:LP+L.search+L.hash},t))})
os = null
// promise wrapper around DB transactions
// q: the request
// f: optionall callback to transform result
queryDB = (q, f) =>
  new Promise(r => q['onsuccess'] = e => r(f ? f(e) : e[T].result))
// n: database name
// t: table name
getDB = (n = DB, t = FILES) => {
  let q = indexedDB.open(n)
  // create history store too (no keyPath, we supply key on put)
  q.onupgradeneeded = e => {let r=e[T].result;r[S](t);r[S]($H)}
  return queryDB(q, e => e[T].result)
}
// returns all keys in database
// q: query
// d: database
keys = (q, d) => queryDB(tx('readonly', d).getAllKeys(q))
// db transaction
// m: transaction mode
// d: database
tx = (m = 'readonly', d = db, t = FILES) => d.transaction(t, m).objectStore(t)
// read
read = async (k, d = db) => {
  d = d.trim ? await getDB(d) : d
  let v = await queryDB(tx('readonly', d).get(k || filename))
  return !v && d == db && os ? read(k, os) : v
}
// run boot/* files
boot = async () => {
  db = await getDB()
  os = DB[TL]() == MAIN[TL]() ? null : await getDB(MAIN)
  let q = IDBKeyRange.bound('boot', 'boot\uffff'),
    b = await keys(q)
  if (os) b = [...new Set([...b, ...await keys(q, os)])]
  for (let f of b) {
    try { (new Function('globals', await read(f)))(this) }
    catch (e) { console.error(f, e) }
  }
  run()
}
// run the os
run = async () => {
  if (!db) db = await getDB()
  if (!L.hash) {
    HR(0, '', `#${MAIN}`)
    return run()
  }
  let c, ctx, h = L.hash.slice(1),
    [n, q] = h.split('?'),
    f = filename = n,
    p = new URLSearchParams(q),
    v = await read(n) || '',
    app = false // append mode

  // record history
  q&&log()

  // The Machine Tape
  for (let [k, val] of p) {
    val = decodeURIComponent(val)
    let r, s
    // should we overwrite (0) or append (1)
    if (k == 'a') app = val != '0'
    // file pointer
    else if (k == 'f') f = val
    // additional context buffer for ai only (does not get added to accumalator)
    else if (k == 'c') {
      if (val == '0') ctx = ''
      else ctx = `<CONTEXT>${(ctx || '')}</CONTEXT>
${((val == 'src' ? S.innerText : await read(val)) || '')}`
    }
    // ai variables
    else if ('kmsh'.includes(k)) $L.setItem(k, val)
    // accumalator commands (including prompting)
    else if ('erup'.includes(k)) {
      s = val
      if (k == 'r') s = (val == 'src' ? S.innerText : await read(val)) || ''
      else if (k == 'u') s = await (await fetch(val)).text()
      else if (k == 'p') s = await gen((ctx ? ctx + '\n' : '') + v, val)
      v = app ? v + s : s
    }
    // write accumalator to disk
    else if (k == 'w') await write(v, f)
    // execute code
    else if (k == 'x') {
      try {
        let c = val || v
        r = await (new Function('globals', 'v', c))(this, v)
        if (r !== void 0) v = r
      } catch (e) { console.error(e) }
    }
    // autoload other params
    else if (c = await read(k)) {
      try {
        r = await (new Function('globals', 'v', 'arg', c))(this, v, val)
        if (r !== void 0) v = r
      } catch (e) { v = app ? v + c : c }
    }
  }
  if (q) HR(0, '', '#' + n)
  hydrate(v)
}
// inject content into DOM and run scripts
// h: html content to inject
hydrate = h => {
  A.innerHTML = h
  A.querySelectorAll('script').forEach(o => {
    let s = document.createElement('script')
    Array.from(o.attributes).forEach(a => s.setAttribute(a.name, a.value))
    s.text = o.textContent
    o.replaceWith(s)
  })
}
// Vibe coding
// ctx: extra context
// p: the prompt to use
gen = async (ctx, p) => {
  let [k, m, s, h] = ['k', 'm', 's', 'h'].map(x => $L.getItem(x)),
    msg = ctx + p + (s || '\nUSE CONCATENATIVE PROGRAMMING TECHNIQUES, USE CLASSES AND GLOBALS THAT CAN BE UPDATED BY LATER SCRIPTS, ONLY THESE TASKS, NO INNOVATING, NO TALKING, NO MARKDOWN, DO NOT ACKNOWLEDGE, BEGIN RAW OUTPUT NOW:'),
    u = h,
    b = { model: m, messages: [{ role: 'user', content: msg }], stream: false, reasoning: { enabled: false } },
    head = { 'Content-Type': 'application/json' },
    req, res, txt
  if (k) head['Authorization'] = `Bearer ${k}`
  A.innerHTML = 'Thinking...'
  try {
    req = await fetch(u, { method: 'POST', headers: head, body: JSON.stringify(b) })
    res = await req.json()
    txt = res.message?.content || res.choices?.[0]?.message?.content
  } catch (e) { txt = e.message }
  return txt || ''
}
onhashchange = () => run()
boot()
</script>
